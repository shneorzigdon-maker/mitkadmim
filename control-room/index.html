<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מתקדמים – חדר בקרה</title><style>
:root{--bg:#f4f7fb;--ink:#1d2740;--muted:#687187;--primary:#6558e8;--green:#16805f;--line:#e2e7f0;--danger:#b23b3b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}.shell{max-width:1320px;margin:auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.brand{font-size:25px;font-weight:900}.badge{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 13px}.btn{border:0;border-radius:13px;padding:11px 16px;font-weight:800;background:var(--primary);color:white;cursor:pointer}.btn.secondary{background:#ebe9ff;color:var(--primary)}.btn.danger{background:#ffe8e8;color:var(--danger)}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}.card{background:white;border:1px solid var(--line);border-radius:20px;padding:19px;box-shadow:0 8px 24px #27304c0c}.metric small{color:var(--muted)}.num{font-size:34px;font-weight:900;color:var(--primary);margin-top:7px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.input{padding:11px 13px;border:1px solid var(--line);border-radius:12px;min-width:230px;background:white}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:900px}th,td{text-align:right;padding:11px;border-bottom:1px solid var(--line);font-size:14px}tr.clickable{cursor:pointer}tr.clickable:hover{background:#faf9ff}.empty{text-align:center;padding:42px;color:var(--muted)}.login{position:fixed;inset:0;z-index:30;background:linear-gradient(135deg,#eeeaff,#e8faf4);display:grid;place-items:center;padding:20px}.login.hidden,.hidden{display:none!important}.login-card{width:min(440px,100%);background:#fff;border-radius:26px;padding:28px;box-shadow:0 25px 70px #27304c2b}.login input{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;margin:6px 0}.status{font-weight:800;color:var(--danger);margin-top:12px;line-height:1.5}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px}.modal{position:fixed;inset:0;z-index:40;background:#18203788;display:grid;place-items:center;padding:18px}.modal-card{background:#fff;width:min(850px,100%);max-height:90vh;overflow:auto;border-radius:24px;padding:24px}.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.detail{background:#f7f8fc;border-radius:14px;padding:13px}.detail b{display:block;margin-top:5px}.progress{height:10px;background:#eceef5;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:var(--primary)}@media(max-width:950px){.grid{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.grid,.detail-grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.shell{padding:14px}}
</style></head><body>
<div id="login" class="login"><div class="login-card"><h1>🔐 חדר בקרה</h1><p>הכניסה מיועדת למנהל שהוגדר ב-Firestore בלבד.</p><button id="google" class="btn" style="width:100%">כניסה עם Google</button><input id="email" type="email" placeholder="אימייל"><input id="password" type="password" placeholder="סיסמה"><button id="emailLogin" class="btn secondary" style="width:100%">כניסה באימייל</button><div id="loginStatus" class="status"></div></div></div>
<div class="shell"><div class="top"><div><div class="brand">📊 מתקדמים – חדר בקרה</div><small>ניהול משתמשים והתקדמות בענן</small></div><div><span id="who" class="badge">לא מחובר</span> <button id="logout" class="btn secondary">יציאה</button></div></div>
<div class="grid"><div class="card metric"><small>משתמשים רשומים</small><div id="usersCount" class="num">0</div></div><div class="card metric"><small>פעילים היום</small><div id="activeToday" class="num">0</div></div><div class="card metric"><small>חדשים השבוע</small><div id="newWeek" class="num">0</div></div><div class="card metric"><small>אימונים שבוצעו</small><div id="fitnessCount" class="num">0</div></div><div class="card metric"><small>מילים שנלמדו</small><div id="wordsCount" class="num">0</div></div></div>
<div class="controls"><button id="refresh" class="btn">רענון</button><button id="export" class="btn secondary">ייצוא CSV</button><input id="search" class="input" placeholder="חיפוש לפי שם או אימייל"><select id="fitnessFilter" class="input"><option value="">כל מסלולי הכושר</option><option value="configured">מסלול נבחר</option><option value="missing">ללא מסלול</option></select></div>
<div class="card"><div class="section-title"><h2>משתמשים</h2><small id="shownCount"></small></div><div id="usersTable" class="empty">טוען...</div></div></div>
<div id="modal" class="modal hidden"><div class="modal-card"><div class="section-title"><h2 id="modalTitle">פרטי משתמש</h2><button id="closeModal" class="btn secondary">סגירה</button></div><div id="userDetails"></div></div></div>
<script src="firebase-config.js"></script><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,GoogleAuthProvider,signInWithPopup,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,getDoc,collection,getDocs}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const app=initializeApp(window.MITKADMIM_FIREBASE_CONFIG),auth=getAuth(app),db=getFirestore(app);let users=[];const $=s=>document.querySelector(s);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const dateOf=x=>x?.toDate?x.toDate():x?new Date(x):null;const fmt=x=>dateOf(x)?.toLocaleString('he-IL')||'—';const arr=x=>Array.isArray(x)?x:[];const state=u=>u.state||{};const fit=u=>u.fitness||state(u).fitness||{};const fitnessLogs=u=>arr(fit(u).logs||fit(u).history||state(u).fitnessHistory);const known=u=>arr(state(u).known||state(u).knownWords||state(u).english?.known);const points=u=>Number(state(u).points??state(u).score??0)||0;const name=u=>state(u).profile?.name||u.displayName||'—';
$('#google').onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>$('#loginStatus').textContent=e.message);$('#emailLogin').onclick=()=>signInWithEmailAndPassword(auth,$('#email').value.trim(),$('#password').value).catch(()=>$('#loginStatus').textContent='פרטי הכניסה אינם נכונים');$('#logout').onclick=()=>signOut(auth);$('#refresh').onclick=loadAll;$('#search').oninput=renderUsers;$('#fitnessFilter').onchange=renderUsers;$('#closeModal').onclick=()=>$('#modal').classList.add('hidden');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.add('hidden')};
onAuthStateChanged(auth,async u=>{if(!u){$('#login').classList.remove('hidden');return}try{const admin=await getDoc(doc(db,'admins',u.uid));if(!admin.exists()||admin.data().enabled!==true)throw new Error('not-admin');$('#login').classList.add('hidden');$('#who').textContent=u.email||u.displayName;await loadAll()}catch(e){$('#loginStatus').innerHTML='החשבון מחובר, אך עדיין לא הוגדר כמנהל.<br>יש ליצור ב-Firestore מסמך: <b>admins/'+esc(u.uid)+'</b><br>ובתוכו שדה Boolean בשם <b>enabled</b> עם הערך true.';await signOut(auth)}});
async function loadAll(){try{const snap=await getDocs(collection(db,'users'));users=snap.docs.map(d=>({uid:d.id,...d.data()}));render()}catch(e){console.error(e);$('#usersTable').innerHTML='<div class="empty">לא ניתן לקרוא משתמשים. ודאו שכללי Firestore הוחלפו בקובץ המצורף.</div>'}}
function render(){const now=new Date(),startWeek=new Date(now);startWeek.setDate(now.getDate()-7);$('#usersCount').textContent=users.length;$('#activeToday').textContent=users.filter(u=>dateOf(u.lastSeenAt)?.toDateString()===now.toDateString()).length;$('#newWeek').textContent=users.filter(u=>dateOf(u.createdAt||u.registeredAt||u.updatedAt)>=startWeek).length;$('#fitnessCount').textContent=users.reduce((n,u)=>n+fitnessLogs(u).length,0);$('#wordsCount').textContent=users.reduce((n,u)=>n+known(u).length,0);renderUsers()}
function filtered(){const term=$('#search').value.trim().toLowerCase(),ff=$('#fitnessFilter').value;return users.filter(u=>{const text=`${name(u)} ${u.email||''}`.toLowerCase();const configured=!!fit(u).configured;return text.includes(term)&&(!ff||(ff==='configured'?configured:!configured))})}
function renderUsers(){const rows=filtered();$('#shownCount').textContent=`מוצגים ${rows.length} מתוך ${users.length}`;$('#usersTable').innerHTML=rows.length?`<div class="table-wrap"><table><thead><tr><th>שם</th><th>אימייל</th><th>כניסה אחרונה</th><th>נקודות</th><th>מילים</th><th>אימונים</th><th>כושר</th></tr></thead><tbody>${rows.map(u=>`<tr class="clickable" data-id="${esc(u.uid)}"><td><b>${esc(name(u))}</b></td><td>${esc(u.email||'—')}</td><td>${fmt(u.lastSeenAt)}</td><td>${points(u)}</td><td>${known(u).length}</td><td>${fitnessLogs(u).length}</td><td>${fit(u).configured?'נבחר':'טרם נבחר'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">לא נמצאו משתמשים</div>';document.querySelectorAll('tr[data-id]').forEach(r=>r.onclick=()=>openUser(users.find(u=>u.uid===r.dataset.id)))}
function openUser(u){if(!u)return;const f=fit(u),p=state(u).profile||{},logs=fitnessLogs(u),words=known(u);$('#modalTitle').textContent=name(u);$('#userDetails').innerHTML=`<div class="detail-grid"><div class="detail">אימייל<b>${esc(u.email||'—')}</b></div><div class="detail">גיל<b>${esc(p.age||'—')}</b></div><div class="detail">כניסה אחרונה<b>${fmt(u.lastSeenAt)}</b></div><div class="detail">נקודות<b>${points(u)}</b></div><div class="detail">מילים שנלמדו<b>${words.length}</b></div><div class="detail">אימונים שבוצעו<b>${logs.length}</b></div><div class="detail">רמת אנגלית<b>${esc(state(u).english?.level||state(u).englishLevel||'—')}</b></div><div class="detail">רמת כושר<b>${esc(f.level||f.plan||'—')}</b></div><div class="detail">ימי אימון<b>${esc(arr(f.days).join(', ')||'—')}</b></div></div><h3>מצב מסלול הכושר</h3><p>${f.configured?'המסלול הוגדר ונשמר בענן.':'המשתמש עדיין לא הגדיר מסלול כושר.'}</p><h3>נתוני מערכת</h3><pre style="white-space:pre-wrap;background:#f7f8fc;padding:14px;border-radius:14px;direction:ltr;text-align:left">${esc(JSON.stringify({appVersion:u.appVersion,updatedAt:fmt(u.updatedAt),fitnessSavedAt:u.fitnessSavedAt},null,2))}</pre>`;$('#modal').classList.remove('hidden')}
$('#export').onclick=()=>{const q=v=>'"'+String(v??'').replaceAll('"','""')+'"',csv=['שם,אימייל,כניסה אחרונה,נקודות,מילים,אימונים,מסלול כושר',...filtered().map(u=>[name(u),u.email,dateOf(u.lastSeenAt)?.toISOString()||'',points(u),known(u).length,fitnessLogs(u).length,fit(u).configured?'כן':'לא'].map(q).join(','))].join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='mitkadmim-users.csv';a.click();URL.revokeObjectURL(a.href)};
</script></body></html>
