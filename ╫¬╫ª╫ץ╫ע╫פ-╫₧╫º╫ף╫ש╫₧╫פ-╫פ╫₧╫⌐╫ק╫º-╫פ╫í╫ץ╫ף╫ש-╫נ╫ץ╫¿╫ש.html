<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>אורי והיער הסודי</title>
<style>
  *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:Arial,"Rubik",sans-serif;background:#071a20;color:#fff}
  #wrap{position:relative;width:100%;height:100%;min-height:520px;background:linear-gradient(#102a46,#174a48 52%,#0c261c);overflow:hidden}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .hud{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;pointer-events:none}
  .hud-group{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.pill{background:#071722c9;border:1px solid #ffffff2a;backdrop-filter:blur(10px);padding:9px 14px;border-radius:999px;font-weight:900;box-shadow:0 8px 22px #0005}.pill b{color:#ffe46a}.heart{color:#ff647c}
  .top-actions{pointer-events:auto;display:flex;gap:8px}.iconbtn{border:1px solid #ffffff35;background:#071722c9;color:#fff;width:42px;height:42px;border-radius:14px;font-size:20px;cursor:pointer}
  .panel{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(#06131ab5,#06131ad8);padding:20px;z-index:5}
  .card{width:min(560px,94vw);background:linear-gradient(145deg,#173d46ee,#112831ee);border:1px solid #ffffff2c;border-radius:28px;padding:28px;text-align:center;box-shadow:0 25px 70px #0009, inset 0 1px #ffffff25;backdrop-filter:blur(12px)}
  .logo{font-size:62px;filter:drop-shadow(0 8px 12px #0007)}h1{margin:8px 0 6px;font-size:clamp(30px,5vw,48px)}.subtitle{opacity:.86;line-height:1.6;margin:0 auto 18px;max-width:430px}
  .features{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:18px 0}.feature{background:#ffffff0e;border:1px solid #ffffff1d;border-radius:16px;padding:12px 7px;font-size:13px;font-weight:800}.feature span{display:block;font-size:25px;margin-bottom:5px}
  .primary{border:0;background:linear-gradient(135deg,#ffe36e,#ffb43e);color:#1e260b;font-weight:950;font-size:18px;padding:14px 30px;border-radius:17px;cursor:pointer;box-shadow:0 10px 28px #ffbd3e55;transition:.2s}.primary:hover{transform:translateY(-2px)}
  .hint{font-size:13px;opacity:.7;margin-top:14px}.hidden{display:none!important}
  .mission{position:absolute;top:76px;left:50%;transform:translateX(-50%);background:#09202bd9;border:1px solid #ffffff25;border-radius:16px;padding:9px 16px;font-size:14px;font-weight:850;white-space:nowrap;box-shadow:0 8px 25px #0004;transition:.35s;pointer-events:none}
  .toast{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%) scale(.8);opacity:0;background:#fff;color:#17331f;border-radius:18px;padding:13px 20px;font-weight:950;font-size:20px;z-index:4;transition:.25s;box-shadow:0 15px 40px #0008}.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .controls{position:absolute;left:18px;right:18px;bottom:18px;display:flex;justify-content:space-between;align-items:end;pointer-events:none}.control-btn{pointer-events:auto;width:72px;height:72px;border-radius:24px;border:1px solid #ffffff3b;background:#071722b9;color:#fff;font-size:30px;box-shadow:0 10px 28px #0006;backdrop-filter:blur(8px);touch-action:none}.jump{width:86px;height:86px;background:linear-gradient(145deg,#795fffcc,#4430cacc)}
  @media(min-width:850px){.controls{display:none}}@media(max-width:600px){#wrap{min-height:460px}.hud{top:8px;left:8px;right:8px}.pill{padding:7px 10px;font-size:13px}.mission{top:62px;font-size:12px}.card{padding:22px 17px}.features{grid-template-columns:1fr 1fr}.features .feature:last-child{grid-column:1/-1}.logo{font-size:48px}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div class="hud hidden" id="hud">
    <div class="hud-group"><div class="pill">⭐ <b id="score">0</b></div><div class="pill">💎 <b id="gems">0</b></div><div class="pill">מרחק <b id="distance">0</b> מ׳</div></div>
    <div class="top-actions"><button class="iconbtn" id="soundBtn" title="צליל">🔊</button><button class="iconbtn" id="pauseBtn" title="השהיה">⏸️</button></div>
  </div>
  <div class="mission hidden" id="mission">משימה: אספו 10 כוכבים והגיעו ל־500 מטר</div>
  <div class="toast" id="toast"></div>
  <div class="controls hidden" id="controls"><button class="control-btn" id="duckBtn">⬇️</button><button class="control-btn jump" id="jumpBtn">⬆️</button></div>
  <div class="panel" id="startPanel"><div class="card"><div class="logo">🌲✨🏃</div><h1>אורי והיער הסודי</h1><p class="subtitle">רוצו בין העצים, קפצו מעל מכשולים, אספו כוכבים ויהלומים וגלו עד כמה רחוק תוכלו להגיע.</p><div class="features"><div class="feature"><span>⭐</span>אספו פרסים</div><div class="feature"><span>⬆️</span>קפיצה כפולה</div><div class="feature"><span>⚡</span>המשחק נהיה מהיר</div></div><button class="primary" id="startBtn">מתחילים לשחק</button><div class="hint">מחשב: רווח או ↑ לקפיצה, ↓ להתכופפות · בטלפון: הכפתורים שעל המסך</div></div></div>
  <div class="panel hidden" id="endPanel"><div class="card"><div class="logo" id="endEmoji">🏆</div><h1 id="endTitle">כל הכבוד!</h1><p class="subtitle" id="endText"></p><button class="primary" id="againBtn">משחק נוסף</button></div></div>
</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const $=id=>document.getElementById(id); let W=0,H=0,dpr=1,raf=0,last=0;
let running=false,paused=false,sound=true,score=0,gems=0,distance=0,speed=420,spawn=0,starSpawn=0,time=0;
let obstacles=[],collectibles=[],particles=[],trees=[];
const player={x:0,y:0,w:48,h:72,vy:0,onGround:true,jumps:0,duck:false,inv:0};
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);player.x=Math.max(68,W*.14);if(!running)player.y=ground()-player.h;makeTrees()}
function ground(){return H-Math.max(88,H*.16)}
function makeTrees(){trees=[];for(let i=0;i<18;i++)trees.push({x:i*(W/10)+Math.random()*80,y:ground(),s:.55+Math.random()*.8,layer:i%3})}
function reset(){score=gems=distance=time=0;speed=420;spawn=1;starSpawn=.5;obstacles=[];collectibles=[];particles=[];Object.assign(player,{y:ground()-72,w:48,h:72,vy:0,onGround:true,jumps:0,duck:false,inv:0});updateHud()}
function start(){reset();running=true;paused=false;last=performance.now();$('startPanel').classList.add('hidden');$('endPanel').classList.add('hidden');$('hud').classList.remove('hidden');$('mission').classList.remove('hidden');$('controls').classList.remove('hidden');cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}
function jump(){if(!running||paused)return;if(player.jumps<2){player.vy=-Math.max(650,H*1.05);player.onGround=false;player.jumps++;burst(player.x+25,player.y+player.h,8,'#dfffd8');beep(420+player.jumps*100,.06)}}
function setDuck(v){player.duck=v;if(v&&player.onGround){player.h=44;player.y=ground()-44}else if(!v){player.h=72;if(player.onGround)player.y=ground()-72}}
function spawnObstacle(){const type=Math.random();if(type<.48)obstacles.push({x:W+50,y:ground()-48,w:58,h:48,type:'log'});else if(type<.82)obstacles.push({x:W+50,y:ground()-65,w:48,h:65,type:'rock'});else obstacles.push({x:W+50,y:ground()-118,w:60,h:34,type:'branch'});}
function spawnCollect(){let count=Math.random()<.3?3:1;let base=ground()-90-Math.random()*100;for(let i=0;i<count;i++)collectibles.push({x:W+60+i*54,y:base-(i===1?20:0),r:17,type:Math.random()<.16?'gem':'star',spin:0})}
function hit(a,b){return a.x+8<b.x+b.w&&a.x+a.w-8>b.x&&a.y+5<b.y+b.h&&a.y+a.h-4>b.y}
function update(dt){time+=dt;speed=Math.min(760,420+time*11);distance+=speed*dt/65;spawn-=dt;starSpawn-=dt;if(spawn<=0){spawnObstacle();spawn=.9+Math.random()*1.25-speed/1200}if(starSpawn<=0){spawnCollect();starSpawn=.65+Math.random()*1.05}
 player.vy+=1750*dt;player.y+=player.vy*dt;if(player.y+player.h>=ground()){player.y=ground()-player.h;player.vy=0;player.onGround=true;player.jumps=0}if(player.inv>0)player.inv-=dt;
 obstacles.forEach(o=>o.x-=speed*dt);collectibles.forEach(c=>{c.x-=speed*dt;c.spin+=dt*5});particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=500*dt;p.life-=dt});
 for(const o of obstacles){if(hit(player,o)&&player.inv<=0){end(false);return}}
 collectibles=collectibles.filter(c=>{const box={x:c.x-c.r,y:c.y-c.r,w:c.r*2,h:c.r*2};if(hit(player,box)){if(c.type==='gem'){gems++;score+=25;showToast('יהלום! 💎')}else{score+=10;showToast('מעולה! ⭐')}burst(c.x,c.y,12,c.type==='gem'?'#63eaff':'#ffe46a');beep(c.type==='gem'?780:620,.07);return false}return c.x>-60});
 obstacles=obstacles.filter(o=>o.x>-100);particles=particles.filter(p=>p.life>0);score+=dt*2;updateHud();if(distance>=500&&score>0&&!window.missionDone){window.missionDone=true;showToast('המשימה הושלמה! 🏆')}}
function draw(){ctx.clearRect(0,0,W,H);let grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#142d56');grad.addColorStop(.52,'#1b6d66');grad.addColorStop(1,'#0b291f');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
 // moon and stars
 ctx.globalAlpha=.75;ctx.fillStyle='#fff8c9';ctx.beginPath();ctx.arc(W*.82,H*.16,34,0,Math.PI*2);ctx.fill();for(let i=0;i<28;i++){let x=(i*97)%W,y=(i*53)%(H*.45);ctx.globalAlpha=.2+(i%4)*.15;ctx.fillStyle='#fff';ctx.fillRect(x,y,2,2)}ctx.globalAlpha=1;
 // parallax hills
 hill('#164f4c',ground()-105,38,(time*speed*.06)%90);hill('#103b35',ground()-58,52,(time*speed*.13)%110);
 trees.forEach(t=>drawTree(((t.x-time*speed*(.08+t.layer*.05))%(W+180)+W+180)%(W+180)-90,t.y,t.s,t.layer));
 // ground
 ctx.fillStyle='#173f28';ctx.fillRect(0,ground(),W,H-ground());ctx.fillStyle='#2b7a43';ctx.fillRect(0,ground(),W,7);for(let x=-((time*speed*.7)%80);x<W;x+=80){ctx.fillStyle='#3c9250';ctx.beginPath();ctx.ellipse(x,ground()+26,42,7,0,0,Math.PI*2);ctx.fill()}
 obstacles.forEach(drawObstacle);collectibles.forEach(drawCollect);drawPlayer();particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,4,4)});ctx.globalAlpha=1}
function hill(color,y,amp,off){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,y);for(let x=0;x<=W+80;x+=80)ctx.quadraticCurveTo(x+40,y-amp-Math.sin((x+off)/90)*15,x+80,y);ctx.lineTo(W,H);ctx.fill()}
function drawTree(x,y,s,l){ctx.globalAlpha=.45+l*.18;ctx.fillStyle=l===2?'#092d26':'#0d3b31';ctx.fillRect(x-7*s,y-145*s,14*s,145*s);ctx.beginPath();ctx.arc(x,y-160*s,52*s,0,Math.PI*2);ctx.arc(x-30*s,y-125*s,38*s,0,Math.PI*2);ctx.arc(x+32*s,y-128*s,40*s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
function drawObstacle(o){if(o.type==='log'){ctx.fillStyle='#774527';round(o.x,o.y,o.w,o.h,17);ctx.fill();ctx.strokeStyle='#a96e43';ctx.lineWidth=4;ctx.beginPath();ctx.arc(o.x+12,o.y+24,10,0,Math.PI*2);ctx.stroke()}else if(o.type==='rock'){ctx.fillStyle='#68777a';ctx.beginPath();ctx.moveTo(o.x,o.y+o.h);ctx.lineTo(o.x+9,o.y+20);ctx.lineTo(o.x+28,o.y);ctx.lineTo(o.x+o.w,o.y+25);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.fill();ctx.fillStyle='#91a3a6';ctx.beginPath();ctx.ellipse(o.x+27,o.y+18,10,5,-.5,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle='#5f351f';round(o.x,o.y,o.w,o.h,12);ctx.fill();ctx.fillStyle='#2c6a34';for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(o.x+10+i*19,o.y-7,15,8,-.5,0,Math.PI*2);ctx.fill()}}}
function drawCollect(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(Math.sin(c.spin)*.18);ctx.shadowBlur=18;ctx.shadowColor=c.type==='gem'?'#50e9ff':'#ffe86a';ctx.fillStyle=c.type==='gem'?'#65e8ff':'#ffe45f';if(c.type==='gem'){ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(15,-5);ctx.lineTo(10,16);ctx.lineTo(-10,16);ctx.lineTo(-15,-5);ctx.closePath();ctx.fill()}else star(0,0,18,8,5);ctx.restore();ctx.shadowBlur=0}
function drawPlayer(){ctx.save();if(player.inv>0&&Math.floor(player.inv*10)%2)ctx.globalAlpha=.35;let x=player.x,y=player.y,w=player.w,h=player.h;ctx.fillStyle='#f2c29a';ctx.beginPath();ctx.arc(x+w*.55,y+13,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222b3a';ctx.beginPath();ctx.arc(x+w*.53,y+9,13,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcf32';round(x+9,y+24,w-16,h*.43,12);ctx.fill();ctx.strokeStyle='#172b52';ctx.lineWidth=8;ctx.lineCap='round';let swing=Math.sin(time*12)*9;ctx.beginPath();ctx.moveTo(x+19,y+h*.65);ctx.lineTo(x+12+swing,y+h-4);ctx.moveTo(x+w-18,y+h*.65);ctx.lineTo(x+w-9-swing,y+h-4);ctx.stroke();ctx.strokeStyle='#f2c29a';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x+13,y+35);ctx.lineTo(x+3-swing*.6,y+51);ctx.moveTo(x+w-14,y+35);ctx.lineTo(x+w+2+swing*.6,y+47);ctx.stroke();ctx.restore()}
function round(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}function star(cx,cy,outer,inner,n){let a=-Math.PI/2;ctx.beginPath();for(let i=0;i<n*2;i++){let r=i%2?inner:outer;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);a+=Math.PI/n}ctx.closePath();ctx.fill()}
function burst(x,y,n,c){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*260,vy:-Math.random()*220,life:.6+Math.random()*.5,c})}
function updateHud(){$('score').textContent=Math.floor(score);$('gems').textContent=gems;$('distance').textContent=Math.floor(distance)}
function showToast(t){let el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove('show'),700)}
function end(){running=false;cancelAnimationFrame(raf);$('hud').classList.add('hidden');$('mission').classList.add('hidden');$('controls').classList.add('hidden');$('endPanel').classList.remove('hidden');$('endEmoji').textContent=distance>=500?'🏆':'🌟';$('endTitle').textContent=distance>=500?'משימה הושלמה!':'כל הכבוד!';$('endText').textContent=`הגעתם ל־${Math.floor(distance)} מטר, צברתם ${Math.floor(score)} נקודות ואספתם ${gems} יהלומים.`;beep(240,.15)}
function loop(now){if(!running)return;let dt=Math.min(.032,(now-last)/1000);last=now;if(!paused)update(dt);draw();raf=requestAnimationFrame(loop)}
function togglePause(){if(!running)return;paused=!paused;$('pauseBtn').textContent=paused?'▶️':'⏸️';showToast(paused?'המשחק מושהה':'ממשיכים!')}
function beep(freq,dur){if(!sound)return;try{let ac=window._ac||(window._ac=new (AudioContext||webkitAudioContext)()),o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;g.gain.setValueAtTime(.035,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur)}catch(e){}}
$('startBtn').onclick=start;$('againBtn').onclick=start;$('pauseBtn').onclick=togglePause;$('soundBtn').onclick=()=>{sound=!sound;$('soundBtn').textContent=sound?'🔊':'🔇'};
addEventListener('keydown',e=>{if(['Space','ArrowUp'].includes(e.code)){e.preventDefault();jump()}if(e.code==='ArrowDown')setDuck(true);if(e.code==='Escape')togglePause()});addEventListener('keyup',e=>{if(e.code==='ArrowDown')setDuck(false)});
['pointerdown','touchstart'].forEach(ev=>$('jumpBtn').addEventListener(ev,e=>{e.preventDefault();jump()},{passive:false}));$('duckBtn').addEventListener('pointerdown',e=>{e.preventDefault();setDuck(true)});['pointerup','pointercancel','pointerleave'].forEach(ev=>$('duckBtn').addEventListener(ev,()=>setDuck(false)));
addEventListener('resize',resize);resize();draw();
})();
</script>
</body></html>
